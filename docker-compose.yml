services:
  # ---- Postgres (shared by dev and prod profiles) ----
  db:
    image: postgres:16-alpine
    container_name: cram-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-crm}
    ports:
      # Bound to localhost only — the app reaches Postgres over the compose
      # network (db:5432), so this published port is just for host-side tools
      # (dump-schema, psql). It never needs to be on the LAN.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm}"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["dev", "prod"]

  # ---- Production ----
  app:
    build:
      context: .
      target: production
    container_name: cram
    restart: unless-stopped
    environment:
      # NODE_ENV=production makes the Pino loggers emit raw JSON (one line per
      # event, easy to ship to a log aggregator). Dev profile leaves it unset
      # so pino-pretty kicks in for terminal readability.
      - NODE_ENV=production
      - PORT=3200
      - HOST=0.0.0.0
      - MCP_PORT=3100
      - MCP_HOST=0.0.0.0
      - DATABASE_URL=postgres://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD:-devpassword}@db:5432/${POSTGRES_DB:-crm}
      # Identity (set by setup.sh)
      - VENDOR_NAME=${VENDOR_NAME:-Acme Corp}
      - USER_ROLE=${USER_ROLE:-Sales Engineer}
      # Internal email domains bootstrap (comma-separated). Either var works;
      # SELF_DOMAINS wins if both are set. Ignored once a user curates their
      # own list in-app. See api/src/services/internal-domains/internal-domains.js.
      - SELF_DOMAINS=${SELF_DOMAINS:-}
      - INTERNAL_DOMAINS=${INTERNAL_DOMAINS:-}
      # Agent LLM — local by default (Ollama running on the device itself).
      # `local` is the only provider: an OpenAI-compatible inference server
      # (Ollama / LM Studio / llama.cpp / vLLM). The model is NOT set here —
      # it's a per-user GUI choice, else auto-resolved from the server's
      # installed models (see services/agent/agent-settings.js).
      - AGENT_PROVIDER=${AGENT_PROVIDER:-local}
      # Where the inference server lives. Default = Ollama on the Docker host
      # (this device). Point at a LAN address (e.g. http://192.168.1.50:11434)
      # to use another machine. host.docker.internal needs extra_hosts below.
      - "LOCAL_BASE_URL=${LOCAL_BASE_URL:-http://host.docker.internal:11434}"
      - LOCAL_API_KEY=${LOCAL_API_KEY:-}
      # Todoist (optional). TODOIST_ENABLED defaults to true; set to "false" in
      # .env to skip route/tool/instructions registration entirely. The token
      # passes through from .env so the container reads it from process.env (no
      # host file mount required).
      - TODOIST_ENABLED=${TODOIST_ENABLED:-true}
      - TODOIST_API_TOKEN=${TODOIST_API_TOKEN:-}
      - TODOIST_DEFAULT_PROJECT=${TODOIST_DEFAULT_PROJECT:-Inbox}
      - TODOIST_DEFAULT_SECTION=${TODOIST_DEFAULT_SECTION:-}
      # Krisp webhook (optional). Shared secret you also paste as a custom header
      # (Authorization / x-krisp-webhook-token) in the Krisp dashboard. Unset ⇒ the
      # endpoint accepts any caller (fine for ngrok testing). See krisp/README.md.
      - KRISP_WEBHOOK_TOKEN=${KRISP_WEBHOOK_TOKEN:-}
      # In-container path the scheduled pg_dump writes to. Must live under the
      # /backups bind mount below — the host source of that mount is BACKUP_HOST_DIR.
      - BACKUP_DIR=${BACKUP_DIR:-/backups}
      # Provisioning broker — AES master key that decrypts the provisioning_secrets
      # table at deploy time. The secrets themselves live in Postgres, not here; set
      # PROVISIONING_SECRETS_KEY in .env (openssl rand -base64 32). In-container the
      # local .env→table seed stays off (no broker .env to read; secrets are DB-managed).
      - PROVISIONING_SECRETS_KEY=${PROVISIONING_SECRETS_KEY:-}
      - PROVISIONING_SEED_SECRETS_ON_BOOT=${PROVISIONING_SEED_SECRETS_ON_BOOT:-false}
      - PROVISIONING_TF_PG_CONN=${PROVISIONING_TF_PG_CONN:-postgres://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD:-devpassword}@db:5432/${POSTGRES_DB:-crm}?sslmode=disable}
      - PROVISIONING_RUNTIME_ROOT=${PROVISIONING_RUNTIME_ROOT:-/app/api/.provisioning-runtime}
      # Broker-managed LAN RDP tunnels for private Windows endpoints. These ports
      # are published below. Leave PROVISIONING_RDP_TUNNEL_HOST empty to advertise
      # the host from the HTTP request; set it only to force a specific address.
      - PROVISIONING_RDP_TUNNEL_HOST=${PROVISIONING_RDP_TUNNEL_HOST:-}
      - PROVISIONING_RDP_TUNNEL_BIND_ADDRESS=${PROVISIONING_RDP_TUNNEL_BIND_ADDRESS:-0.0.0.0}
      - PROVISIONING_RDP_TUNNEL_PORTS=${PROVISIONING_RDP_TUNNEL_PORTS:-13389-13399}
      - PROVISIONING_RDP_TUNNEL_INTERNAL_PORTS=${PROVISIONING_RDP_TUNNEL_INTERNAL_PORTS:-23389-23399}
      - PROVISIONING_RDP_TUNNEL_TTL_SECONDS=${PROVISIONING_RDP_TUNNEL_TTL_SECONDS:-28800}
      # AWS provider auth for provisioning: Terraform/AWS CLI read the mounted
      # shared credentials/config files using this profile.
      - AWS_PROFILE=${AWS_PROFILE:-default}
      - AWS_SDK_LOAD_CONFIG=${AWS_SDK_LOAD_CONFIG:-1}
      # PAN-OS first-login bootstrap uses the host SSH agent. Terraform still
      # publishes this public key so the same host identity can log in.
      - PANOS_SSH_PUBLIC_KEY_FILE=/root/.ssh/id_rsa.pub
      - SSH_AUTH_SOCK=/ssh-agent
    # Makes host.docker.internal resolve to the Docker host on Linux. No-op on
    # Mac/Windows Docker Desktop (host.docker.internal works there natively).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # LinkedIn session + rate-limit state persist across restarts.
      # Host must run `node outreach/src/index.js login` once to populate cookies.json.
      - ./outreach/cookies.json:/app/outreach/cookies.json
      - ./outreach/.ratelimit.json:/app/outreach/.ratelimit.json
      # pg_dump backups land here. BACKUP_HOST_DIR can be any absolute host path
      # (e.g. /Volumes/Backups/crm) — it does not have to live under the repo.
      # Defaults to ./backups so a fresh clone "just works" without .env edits.
      - ${BACKUP_HOST_DIR:-./backups}:/backups
      # Shared AWS credentials/config for provisioning. Read-only; selected by
      # AWS_PROFILE above.
      - ${HOME}/.aws:/root/.aws:ro
      # Host SSH agent + public key for provisioning. The private key stays on
      # the host and can remain encrypted/Keychain-backed. Docker Desktop exposes
      # the host agent at /run/host-services/ssh-auth.sock; set
      # PROVISIONING_SSH_AUTH_SOCK to override on other hosts.
      - ${PROVISIONING_SSH_AUTH_SOCK:-/run/host-services/ssh-auth.sock}:/ssh-agent
      - ${HOME}/.ssh/id_rsa.pub:/root/.ssh/id_rsa.pub:ro
    ports:
      # BIND_ADDRESS = host interface to bind to. 127.0.0.1 (default) keeps the
      # app on this machine only; 0.0.0.0 exposes it on the LAN. Set in .env.
      - "${BIND_ADDRESS:-127.0.0.1}:3200:3200"
      - "${BIND_ADDRESS:-127.0.0.1}:3100:3100"
      - "${PROVISIONING_RDP_TUNNEL_PUBLISH_ADDRESS:-127.0.0.1}:13389-13399:13389-13399"
    profiles: ["prod"]

  # ---- Development (hot-reload) ----
  app-dev:
    build:
      context: .
      target: dev
    container_name: cram-dev
    restart: unless-stopped
    environment:
      - PORT=3200
      - HOST=0.0.0.0
      - DATABASE_URL=postgres://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD:-devpassword}@db:5432/${POSTGRES_DB:-crm}
      - VENDOR_NAME=${VENDOR_NAME:-Acme Corp}
      - USER_ROLE=${USER_ROLE:-Sales Engineer}
      # Internal email domains bootstrap (see app service above for semantics).
      - SELF_DOMAINS=${SELF_DOMAINS:-}
      - INTERNAL_DOMAINS=${INTERNAL_DOMAINS:-}
      # Agent LLM — local by default (Ollama on the device). See app service above.
      - AGENT_PROVIDER=${AGENT_PROVIDER:-local}
      - "LOCAL_BASE_URL=${LOCAL_BASE_URL:-http://host.docker.internal:11434}"
      - LOCAL_API_KEY=${LOCAL_API_KEY:-}
      # Todoist (optional). See app service above for semantics.
      - TODOIST_ENABLED=${TODOIST_ENABLED:-true}
      - TODOIST_API_TOKEN=${TODOIST_API_TOKEN:-}
      - TODOIST_DEFAULT_PROJECT=${TODOIST_DEFAULT_PROJECT:-Inbox}
      - TODOIST_DEFAULT_SECTION=${TODOIST_DEFAULT_SECTION:-}
      # Krisp webhook (optional). See app service above for semantics.
      - KRISP_WEBHOOK_TOKEN=${KRISP_WEBHOOK_TOKEN:-}
      - BACKUP_DIR=${BACKUP_DIR:-/backups}
      # Provisioning broker — AES master key that decrypts the provisioning_secrets
      # table at deploy time. The secrets themselves live in Postgres, not here; set
      # PROVISIONING_SECRETS_KEY in .env (openssl rand -base64 32). In-container the
      # local .env→table seed stays off (no broker .env to read; secrets are DB-managed).
      - PROVISIONING_SECRETS_KEY=${PROVISIONING_SECRETS_KEY:-}
      - PROVISIONING_SEED_SECRETS_ON_BOOT=${PROVISIONING_SEED_SECRETS_ON_BOOT:-false}
      - PROVISIONING_TF_PG_CONN=${PROVISIONING_TF_PG_CONN:-postgres://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD:-devpassword}@db:5432/${POSTGRES_DB:-crm}?sslmode=disable}
      - PROVISIONING_RUNTIME_ROOT=${PROVISIONING_RUNTIME_ROOT:-/app/api/.provisioning-runtime}
      # Broker-managed LAN RDP tunnels for private Windows endpoints. These ports
      # are published below. Leave PROVISIONING_RDP_TUNNEL_HOST empty to advertise
      # the host from the HTTP request; set it only to force a specific address.
      - PROVISIONING_RDP_TUNNEL_HOST=${PROVISIONING_RDP_TUNNEL_HOST:-}
      - PROVISIONING_RDP_TUNNEL_BIND_ADDRESS=${PROVISIONING_RDP_TUNNEL_BIND_ADDRESS:-0.0.0.0}
      - PROVISIONING_RDP_TUNNEL_PORTS=${PROVISIONING_RDP_TUNNEL_PORTS:-13389-13399}
      - PROVISIONING_RDP_TUNNEL_INTERNAL_PORTS=${PROVISIONING_RDP_TUNNEL_INTERNAL_PORTS:-23389-23399}
      - PROVISIONING_RDP_TUNNEL_TTL_SECONDS=${PROVISIONING_RDP_TUNNEL_TTL_SECONDS:-28800}
      # AWS provider auth for provisioning: Terraform/AWS CLI read the mounted
      # shared credentials/config files using this profile.
      - AWS_PROFILE=${AWS_PROFILE:-default}
      - AWS_SDK_LOAD_CONFIG=${AWS_SDK_LOAD_CONFIG:-1}
      # PAN-OS first-login bootstrap uses the host SSH agent. Terraform still
      # publishes this public key so the same host identity can log in.
      - PANOS_SSH_PUBLIC_KEY_FILE=/root/.ssh/id_rsa.pub
      - SSH_AUTH_SOCK=/ssh-agent
    # Makes host.docker.internal resolve to the Docker host on Linux. No-op on
    # Mac/Windows Docker Desktop (where the name resolves natively).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount source for hot-reload (node_modules stay in container)
      - ./api/src:/app/api/src
      - ./api/migrations:/app/api/migrations
      - ./gui/src:/app/gui/src
      - ./gui/public:/app/gui/public
      - ./gui/index.html:/app/gui/index.html
      - ./gui/vite.config.ts:/app/gui/vite.config.ts
      - ./tools:/app/tools
      - ./todoist/src:/app/todoist/src
      - ./outreach/src:/app/outreach/src
      - ./outreach/cookies.json:/app/outreach/cookies.json
      - ./outreach/.ratelimit.json:/app/outreach/.ratelimit.json
      - ./events/src:/app/events/src
      - ${BACKUP_HOST_DIR:-./backups}:/backups
      # Shared AWS credentials/config for provisioning. Read-only; selected by
      # AWS_PROFILE above.
      - ${HOME}/.aws:/root/.aws:ro
      # Host SSH agent + public key for provisioning. The private key stays on
      # the host and can remain encrypted/Keychain-backed. Docker Desktop exposes
      # the host agent at /run/host-services/ssh-auth.sock; set
      # PROVISIONING_SSH_AUTH_SOCK to override on other hosts.
      - ${PROVISIONING_SSH_AUTH_SOCK:-/run/host-services/ssh-auth.sock}:/ssh-agent
      - ${HOME}/.ssh/id_rsa.pub:/root/.ssh/id_rsa.pub:ro
    ports:
      # BIND_ADDRESS = host interface to bind to (see app service / .env).
      - "${BIND_ADDRESS:-127.0.0.1}:3200:3200"
      - "${BIND_ADDRESS:-127.0.0.1}:3100:3100"
      - "${BIND_ADDRESS:-127.0.0.1}:${GUI_PORT:-80}:80"
      - "${PROVISIONING_RDP_TUNNEL_PUBLISH_ADDRESS:-127.0.0.1}:13389-13399:13389-13399"
    profiles: ["dev"]

  # ---- Dev seed (opt-in) ----
  # One-shot container that populates the DB with realistic test accounts,
  # contacts, opportunities, and meetings. Pair with --profile dev:
  #   docker compose --profile dev --profile seed up
  # The script refuses to run if the DB already has tenant data, so it's safe
  # to leave the seed profile attached across restarts — it'll exit fast.
  seed:
    build:
      context: .
      target: dev
    image: cram-app-dev
    container_name: cram-seed
    environment:
      - API_BASE=http://app-dev:3200/api
    depends_on:
      - app-dev
    volumes:
      - ./dev/scripts:/app/dev/scripts:ro
    command: node /app/dev/scripts/seed-dev-data.js
    restart: "no"
    profiles: ["seed"]

  # ---- Isolated test database (opt-in, used by `npm run test:api`) ----
  # A throwaway Postgres that exists only for the API integration suite. It is
  # fully isolated from the dev/prod `db`: its own container, its own host port
  # (TEST_POSTGRES_PORT, default 55433 — clear of the conventional 5433), and
  # tmpfs storage (RAM-backed, never
  # persisted) so every run starts from an empty database. `npm run test:api`
  # brings it up, the orchestrator migrates + seeds it and runs api/test against
  # a host-booted API, then the container is removed. CI uses a GitHub Actions
  # `postgres:16` service for the same role instead of this container.
  db-test:
    image: postgres:16-alpine
    container_name: cram-db-test
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-crm}
    ports:
      - "127.0.0.1:${TEST_POSTGRES_PORT:-55433}:5432"
    # RAM-backed data dir: fast, and guaranteed-fresh on every (re)create — there
    # is no named volume to leak state between runs.
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm}"]
      interval: 3s
      timeout: 3s
      retries: 15
    profiles: ["test"]

volumes:
  postgres_data:
