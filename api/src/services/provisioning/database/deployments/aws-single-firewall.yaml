name: aws-single-firewall
providerProfile: aws-lab
provider:
  projectName: single-firewall-lab
  vpcCidr: 10.120.0.0/16
  panosVersionMajor: "11.2"
steps:
  - name: aws-network-up
    action: up
    targets:
      - aws-single-firewall-network
    description: Terraform creates a dedicated one-AZ VPC with management, untrust, and trust subnets.
  - name: firewall-up
    action: up
    targets:
      - single-fw-1
    description: Terraform creates one standalone VM-Series firewall.
  - name: firewall-bootstrap
    action: bootstrap
    targets:
      - single-fw-1
    description: VM-Series adapter sets the admin password and fetches the VM-Series license.
  - name: firewall-apply-internet-egress
    action: apply-config-addons
    targets:
      - single-fw-1
    params:
      addOn: internet-egress
    description: VM-Series adapter applies the standalone trust-to-internet baseline XML.
  - name: trust-egress-route-up
    action: up
    targets:
      - trust-default-egress
    description: Terraform routes the trust subnet default route through the firewall trust interface.
  - name: windows-endpoint-up
    action: up
    targets:
      - win-user-1
    when:
      param: includeWindowsEndpoint
      equals: true
    description: Optional Windows demo endpoint in the trust subnet.
resources:
  - kind: network
    name: aws-single-firewall-network
    hostname: aws-single-firewall-network
    placement:
      provider: aws
      availabilityZoneCount: 1
      subnetNewbits: 8
      managementSubnetStartIndex: 0
      untrustSubnetStartIndex: 10
      trustSubnetStartIndex: 20
      panoramaSubnetIndex: 30
  - kind: panw-vmseries
    name: single-fw-1
    hostname: single-fw-1
    vm:
      cpuCores: 4
      memoryMb: 8192
      instanceType: m5.xlarge
      started: true
    management:
      type: dhcp-client
      dnsPrimary: 8.8.8.8
      dnsSecondary: 8.8.4.4
    license:
      authCodeEnv: PANW_NGFW_AUTH_CODE
      # CSP Licensing API Key (support portal: Assets -> Licensing API), required
      # for auto-mode license deactivation on destroy. Optional: if this env var
      # is unset, delicense-on-destroy is skipped (best-effort) and Flex credits
      # must be reclaimed via the CSP portal instead.
      deactivationApiKeyEnv: PANW_LICENSE_DEACTIVATION_API_KEY
    managementServer:
      mode: none
    bootstrap:
      adminPasswordEnv: PANOS_ADMIN_PASSWORD
      readinessTimeoutSeconds: 2400
    configProfiles:
      - internet-egress
    destroy:
      allowWithoutDelicense: true
    placement:
      provider: aws
      role: gateway
      availabilityZoneIndex: 0
      network:
        mode: existing
        vpcId:
          fromResource: aws-single-firewall-network
          output: network.vpc_id
        interfaces:
          management:
            subnetId:
              fromResource: aws-single-firewall-network
              output: network.management_subnet_ids.0
          untrust:
            subnetId:
              fromResource: aws-single-firewall-network
              output: network.untrust_subnet_ids.0
          trust:
            subnetId:
              fromResource: aws-single-firewall-network
              output: network.trust_subnet_ids.0
      managementSubnetName: mgmt-a
      untrustSubnetName: untrust-a
      trustSubnetName: trust-a
      attachManagementElasticIp: true
      attachUntrustElasticIp: true
  - kind: egress-route
    name: trust-default-egress
    hostname: trust-default-egress
    placement:
      provider: aws
      network:
        mode: existing
        routeTableId:
          fromResource: aws-single-firewall-network
          output: network.trust_route_table_ids.0
        destinationCidr: 0.0.0.0/0
        nextHop:
          type: network-interface
          networkInterfaceId:
            fromResource: single-fw-1
            output: firewall.trust_network_interface_id
  - kind: windows-endpoint
    name: win-user-1
    hostname: win-user-1
    vm:
      instanceType: m5.large
    bootstrap:
      adminUsername: trusted-user
      adminPasswordEnv: WINDOWS_ENDPOINT_ADMIN_PASSWORD
      installSsmAgent: true
      installPython: true
      pythonInstallUrl: https://www.python.org/ftp/python/3.14.5/python-3.14.5-amd64.exe
    placement:
      provider: aws
      network:
        mode: existing
        vpcId:
          fromResource: aws-single-firewall-network
          output: network.vpc_id
        subnetId:
          fromResource: aws-single-firewall-network
          output: network.trust_subnet_ids.0
      availabilityZoneIndex: 0
      rootVolumeGb: 128
      associatePublicIp: false
      enableRdp: false
      enableWinrm: false
      enableSsm: true
      bootstrapMethod: ssm
      bootstrapTimeoutSeconds: 1800
