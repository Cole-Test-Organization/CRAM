name: aws-gp-lab-trusted-users
providerProfile: aws-lab
provider:
  projectName: gp-lab-trusted-users
  panosVersionMajor: "11.2"
steps:
  - name: aws-apply-network
    action: up
    targets:
      - aws-shared-network
    description: Terraform creates the shared VPC, route tables, and subnets.
  - name: panorama-up
    action: up
    targets:
      - panorama-1
    description: Panorama adapter creates the VM, bootstraps PAN-OS, and generates vm-auth-key.
  - name: firewalls-up
    action: up
    targets:
      - gp-fw-1
      - gp-fw-2
    description: VM-Series adapter creates firewall VMs with the generated vm-auth-key.
  - name: firewall-bootstrap
    action: bootstrap
    targets:
      - gp-fw-1
      - gp-fw-2
    description: VM-Series adapter sets the firewall admin passwords after first boot.
  - name: panorama-verify-connected-resources
    action: verify-connected-resources
    targets:
      - panorama-1
    description: Panorama adapter waits for the expected firewalls to connect.
  - name: panorama-onboard-firewalls
    action: onboard-firewalls
    targets:
      - panorama-1
    description: Panorama adapter creates the device group/template stack and assigns the connected firewalls.
  - name: panorama-apply-internet-config
    action: apply-config-addons
    targets:
      - panorama-1
    description: Panorama adapter imports the Internet access XML add-on and pushes it to the firewalls.
  - name: trust-egress-routes-up
    action: up
    targets:
      - trust-a-default-egress
      - trust-b-default-egress
    description: Terraform routes each trust subnet default route through its firewall trust interface.
  - name: windows-endpoints-up
    action: up
    targets:
      - win-user-a
      - win-user-b
    description: Terraform creates one Windows endpoint in each trust subnet.
resources:
  - kind: network
    name: aws-shared-network
    hostname: aws-shared-network
    placement:
      provider: aws
      availabilityZoneCount: 3
      subnetNewbits: 8
      managementSubnetStartIndex: 0
      untrustSubnetStartIndex: 10
      trustSubnetStartIndex: 20
      panoramaSubnetIndex: 30
  - kind: panorama
    name: panorama-1
    hostname: panorama-1
    vm:
      instanceType: m5.4xlarge
    management:
      type: dhcp-client
      dnsPrimary: 8.8.8.8
      dnsSecondary: 8.8.4.4
    license:
      authCodeEnv: PANW_PANORAMA_AUTH_CODE
      serialEnv: PANW_PANORAMA_SERIAL
    bootstrap:
      adminPasswordEnv: PANOS_ADMIN_PASSWORD
      readinessTimeoutSeconds: 2400
      generateVmAuthKey: true
      vmAuthKeyLifetimeHours: 8760
    onboarding:
      deviceGroup: gp-lab-trusted-users-dg
      template: gp-lab-trusted-users-template
      templateStack: gp-lab-trusted-users-stack
      firewalls:
        - gp-fw-1
        - gp-fw-2
      vsys: vsys1
      commit: true
    configAddOns:
      - name: aws-gp-lab-trusted-users-internet
        file: database/panorama-config-addons/aws-gp-lab-trusted-users-internet.xml
        commit: true
        push:
          templateStack: true
          deviceGroup: true
          timeoutSeconds: 1200
    placement:
      provider: aws
      network:
        mode: existing
        vpcId:
          fromResource: aws-shared-network
          output: network.vpc_id
        subnetId:
          fromResource: aws-shared-network
          output: network.panorama_subnet_id
      subnetName: panorama-a
      # Root/system disk. Panorama AWS images expect the default 81 GiB system disk on first boot.
      rootVolumeGb: 81
      # Panorama logging disk. This is the 2 TiB Panorama disk requirement.
      logVolumeGb: 2048
      logVolumeDeviceName: /dev/sdf
      attachManagementElasticIp: true
  - kind: panw-vmseries
    name: gp-fw-1
    hostname: gp-fw-1
    vm:
      cpuCores: 4
      memoryMb: 8192
      instanceType: m5.xlarge
      started: true
    management:
      type: dhcp-client
      dnsPrimary: 8.8.8.8
      dnsSecondary: 8.8.4.4
    license:
      authCodeEnv: PANW_NGFW_AUTH_CODE
      # CSP Licensing API Key (support portal: Assets -> Licensing API), required
      # for auto-mode license deactivation on destroy. Optional: if this env var
      # is unset, delicense-on-destroy is skipped (best-effort) and Flex credits
      # must be reclaimed via the CSP portal instead.
      deactivationApiKeyEnv: PANW_LICENSE_DEACTIVATION_API_KEY
    managementServer:
      mode: panorama
      panoramaServer:
        fromResource: panorama-1
        output: panorama.mgmt_private
      vmAuthKey:
        fromResource: panorama-1
        state: panos.vmAuthKey
      templateStack: null
      deviceGroup: null
    deviceCertificate:
      pinIdEnv: PANW_DEVICE_CERT_PIN_ID
      pinValueEnv: PANW_DEVICE_CERT_PIN_VALUE
    bootstrap:
      adminPasswordEnv: PANOS_ADMIN_PASSWORD
      readinessTimeoutSeconds: 2400
    destroy:
      allowWithoutDelicense: true
    placement:
      provider: aws
      role: portal+gateway
      availabilityZoneIndex: 0
      network:
        mode: existing
        vpcId:
          fromResource: aws-shared-network
          output: network.vpc_id
        interfaces:
          management:
            subnetId:
              fromResource: aws-shared-network
              output: network.management_subnet_ids.0
          untrust:
            subnetId:
              fromResource: aws-shared-network
              output: network.untrust_subnet_ids.0
          trust:
            subnetId:
              fromResource: aws-shared-network
              output: network.trust_subnet_ids.0
      managementSubnetName: mgmt-a
      untrustSubnetName: untrust-a
      trustSubnetName: trust-a
      attachManagementElasticIp: true
      attachUntrustElasticIp: true
  - kind: panw-vmseries
    name: gp-fw-2
    hostname: gp-fw-2
    vm:
      cpuCores: 4
      memoryMb: 8192
      instanceType: m5.xlarge
      started: true
    management:
      type: dhcp-client
      dnsPrimary: 8.8.8.8
      dnsSecondary: 8.8.4.4
    license:
      authCodeEnv: PANW_NGFW_AUTH_CODE
      # CSP Licensing API Key (support portal: Assets -> Licensing API), required
      # for auto-mode license deactivation on destroy. Optional: if this env var
      # is unset, delicense-on-destroy is skipped (best-effort) and Flex credits
      # must be reclaimed via the CSP portal instead.
      deactivationApiKeyEnv: PANW_LICENSE_DEACTIVATION_API_KEY
    managementServer:
      mode: panorama
      panoramaServer:
        fromResource: panorama-1
        output: panorama.mgmt_private
      vmAuthKey:
        fromResource: panorama-1
        state: panos.vmAuthKey
      templateStack: null
      deviceGroup: null
    deviceCertificate:
      pinIdEnv: PANW_DEVICE_CERT_PIN_ID
      pinValueEnv: PANW_DEVICE_CERT_PIN_VALUE
    bootstrap:
      adminPasswordEnv: PANOS_ADMIN_PASSWORD
      readinessTimeoutSeconds: 2400
    destroy:
      allowWithoutDelicense: true
    placement:
      provider: aws
      role: gateway
      availabilityZoneIndex: 1
      network:
        mode: existing
        vpcId:
          fromResource: aws-shared-network
          output: network.vpc_id
        interfaces:
          management:
            subnetId:
              fromResource: aws-shared-network
              output: network.management_subnet_ids.1
          untrust:
            subnetId:
              fromResource: aws-shared-network
              output: network.untrust_subnet_ids.1
          trust:
            subnetId:
              fromResource: aws-shared-network
              output: network.trust_subnet_ids.1
      managementSubnetName: mgmt-b
      untrustSubnetName: untrust-b
      trustSubnetName: trust-b
      attachManagementElasticIp: true
      attachUntrustElasticIp: true
  - kind: egress-route
    name: trust-a-default-egress
    hostname: trust-a-default-egress
    placement:
      provider: aws
      network:
        mode: existing
        routeTableId:
          fromResource: aws-shared-network
          output: network.trust_route_table_ids.0
        destinationCidr: 0.0.0.0/0
        nextHop:
          type: network-interface
          networkInterfaceId:
            fromResource: gp-fw-1
            output: firewall.trust_network_interface_id
  - kind: egress-route
    name: trust-b-default-egress
    hostname: trust-b-default-egress
    placement:
      provider: aws
      network:
        mode: existing
        routeTableId:
          fromResource: aws-shared-network
          output: network.trust_route_table_ids.1
        destinationCidr: 0.0.0.0/0
        nextHop:
          type: network-interface
          networkInterfaceId:
            fromResource: gp-fw-2
            output: firewall.trust_network_interface_id
  - kind: windows-endpoint
    name: win-user-a
    hostname: win-user-a
    vm:
      instanceType: m5.large
    appProfiles:
      - developer
    bootstrap:
      adminUsername: trusted-user
      adminPasswordEnv: WINDOWS_ENDPOINT_ADMIN_PASSWORD
      installSsmAgent: true
      installPython: true
      pythonInstallUrl: https://www.python.org/ftp/python/3.14.5/python-3.14.5-amd64.exe
    placement:
      provider: aws
      network:
        mode: existing
        vpcId:
          fromResource: aws-shared-network
          output: network.vpc_id
        subnetId:
          fromResource: aws-shared-network
          output: network.trust_subnet_ids.0
      availabilityZoneIndex: 0
      rootVolumeGb: 128
      associatePublicIp: false
      enableRdp: false
      enableWinrm: false
      enableSsm: true
      bootstrapMethod: ssm
      bootstrapTimeoutSeconds: 1800
  - kind: windows-endpoint
    name: win-user-b
    hostname: win-user-b
    vm:
      instanceType: m5.large
    appProfiles:
      - developer
    bootstrap:
      adminUsername: trusted-user
      adminPasswordEnv: WINDOWS_ENDPOINT_ADMIN_PASSWORD
      installSsmAgent: true
      installPython: true
      pythonInstallUrl: https://www.python.org/ftp/python/3.14.5/python-3.14.5-amd64.exe
    placement:
      provider: aws
      network:
        mode: existing
        vpcId:
          fromResource: aws-shared-network
          output: network.vpc_id
        subnetId:
          fromResource: aws-shared-network
          output: network.trust_subnet_ids.1
      availabilityZoneIndex: 1
      rootVolumeGb: 128
      associatePublicIp: false
      enableRdp: false
      enableWinrm: false
      enableSsm: true
      bootstrapMethod: ssm
      bootstrapTimeoutSeconds: 1800
