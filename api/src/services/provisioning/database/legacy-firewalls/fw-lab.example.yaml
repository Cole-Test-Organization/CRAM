hostname: fw-lab-01

proxmox:
  endpointEnv: PROXMOX_VE_ENDPOINT
  apiTokenEnv: PROXMOX_VE_API_TOKEN
  insecure: true
  sshUsername: root
  targetNode: pve01
  templateVmId: 9001
  templateNode: pve01
  vmId: 1201
  vmDatastoreId: local-lvm
  isoDatastoreId: local

vm:
  cpuCores: 4
  memoryMb: 8192
  cpuType: host
  started: true

management:
  type: static
  ipAddress: 192.168.10.50
  netmask: 255.255.255.0
  defaultGateway: 192.168.10.1
  dnsPrimary: 1.1.1.1
  dnsSecondary: 8.8.8.8

interfaces:
  - name: mgmt
    bridge: vmbr0
    model: virtio
  - name: untrust
    bridge: vmbr1
    model: virtio
  - name: trust
    bridge: vmbr2
    model: virtio

license:
  authCodeEnv: PANW_NGFW_AUTH_CODE

managementServer:
  # Use "none" to boot and license without connecting to Panorama or SCM yet.
  mode: none

  # Panorama mode:
  # mode: panorama
  # panoramaServer: panorama.example.local
  # panoramaServer2:
  # vmAuthKey: CHANGE_ME # numeric key from `request bootstrap vm-auth-key generate`
  # Optional: omit templateStack/deviceGroup to only auto-register as a managed device.
  # templateStack: lab-vmseries-stack
  # deviceGroup: lab-firewalls

  # SCM mode:
  # mode: scm

deviceCertificate:
  pinIdEnv:
  pinValueEnv:

destroy:
  allowWithoutDelicense: true
