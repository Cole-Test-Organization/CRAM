hostname: fw-lab-03
proxmox:
    endpointEnv: PROXMOX_VE_ENDPOINT
    apiTokenEnv: PROXMOX_VE_API_TOKEN
    insecure: true
    sshUsername: root
    targetNode: proxmox
    templateVmId: 800
    templateNode: proxmox
    vmId: 803
    vmDatastoreId: local-lvm
    isoDatastoreId: local
vm:
    cpuCores: 4
    memoryMb: 8192
    cpuType: host
    started: true
management:
    type: static
    ipAddress: 10.0.20.6
    netmask: 255.255.255.0
    defaultGateway: 10.0.20.1
    dnsPrimary: 1.1.1.1
    dnsSecondary: 8.8.8.8
interfaces:
    - name: mgmt
      bridge: vmbr0
      model: virtio
      vlanId: 20
    - name: untrust
      bridge: vmbr1
      model: virtio
license:
    authCodeEnv: PANW_NGFW_AUTH_CODE
managementServer:
    mode: panorama
    panoramaServer: 10.0.20.4
    panoramaServer2: null
    vmAuthKey: "506463448742966"
    templateStack: null
    deviceGroup: null
deviceCertificate:
    pinIdEnv: PANW_DEVICE_CERT_PIN_ID
    pinValueEnv: PANW_DEVICE_CERT_PIN_VALUE
destroy:
    allowWithoutDelicense: true
